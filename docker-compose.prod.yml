services:

    django:
        image: ghcr.io/julien-schiele/nextstep-backend:latest
        container_name: nextstep_django
        restart: unless-stopped
        expose:
            - "8000"
        depends_on:
            - database
        env_file:
            - .env.prod
        command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120
        networks:
            - nextstep_net
            - web

    nextjs:
        image: ghcr.io/julien-schiele/nextstep-frontend:latest
        container_name: nextstep_nextjs
        restart: unless-stopped
        expose:
            - "3000"
        depends_on:
            - django
        env_file:
            - .env.prod
        networks:
            - nextstep_net
            - web

    database:
        image: postgres:15
        container_name: nextstep_database
        restart: unless-stopped
        expose:
            - "5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        env_file:
            - .env.prod
        networks:
            - nextstep_net

    uptime-kuma:
        image: louislam/uptime-kuma:2
        container_name: nextstep_uptime
        restart: unless-stopped
        volumes:
            - uptime_data:/app/data
        expose:
            - "3001"
        networks:
            - nextstep_net
            - web

    goaccess:
        image: allinurl/goaccess:latest
        container_name: nextstep_goaccess
        volumes:
            - caddy_logs:/var/log/caddy:ro
            - goaccess_report:/srv/stats
            - ./goaccess.conf:/etc/goaccess/goaccess.conf:ro
            - ./goaccess-generate.sh:/generate.sh:ro
        entrypoint: sh
        command: /generate.sh
        networks:
            - nextstep_net
            - web

volumes:
    db_data:
    uptime_data:
    goaccess_report:
    
    caddy_logs:
        external: true

networks:
    nextstep_net:
        driver: bridge
    web:
        external: true