name: Test, Build & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Detect which submodule changed
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Django tests
  # ─────────────────────────────────────────────────────────────────────────
  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DB_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: ci-only-not-used-in-prod
          DEBUG: 'True'
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python manage.py test --verbosity=2

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Next.js lint + type-check
  # ─────────────────────────────────────────────────────────────────────────
  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/yarn-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Build & push backend image to ghcr
  # ─────────────────────────────────────────────────────────────────────────
  build-backend:
    needs: [changes, test-backend]
    if: |
      always() &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      needs.test-backend.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nextstep-backend:latest
            ghcr.io/${{ github.repository_owner }}/nextstep-backend:${{ github.ref_name }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 5 — Build & push frontend image to ghcr
  # ─────────────────────────────────────────────────────────────────────────
  build-frontend:
    needs: [changes, test-frontend]
    if: |
      always() &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') &&
      needs.test-frontend.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nextstep-frontend:latest
            ghcr.io/${{ github.repository_owner }}/nextstep-frontend:${{ github.ref_name }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 6 — Deploy to VPS
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    needs: [changes, test-backend, test-frontend, build-backend, build-frontend]
    if: |
      always() &&
      (needs.test-backend.result    == 'success' || needs.test-backend.result    == 'skipped') &&
      (needs.test-frontend.result   == 'success' || needs.test-frontend.result   == 'skipped') &&
      (needs.build-backend.result   == 'success' || needs.build-backend.result   == 'skipped') &&
      (needs.build-frontend.result  == 'success' || needs.build-frontend.result  == 'skipped') &&
      (needs.test-backend.result    != 'failure' && needs.test-frontend.result   != 'failure') &&
      (needs.build-backend.result   != 'failure' && needs.build-frontend.result  != 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: deploy nextstep